<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P4 Science Explorer - Singapore Primary 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fffbf7 0%, #f5f3f0 100%);
            color: #2d2d2d;
            min-height: 100vh;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8d6 100%);
            padding: 2rem;
            border-bottom: 3px solid #2d2d2d;
            box-shadow: 4px 4px 0px rgba(45, 45, 45, 0.1);
        }

        .header h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: #d4715f;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        .progress-bar {
            background: #fff;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            height: 12px;
            margin-top: 1rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #c9f0dd 0%, #a8e6cf 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        .sidebar {
            background: #fff;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 4px 4px 0px rgba(45, 45, 45, 0.1);
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-family: 'Caveat', cursive;
            font-size: 1.3rem;
            color: #d4715f;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #ffd4a3;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .topic-btn {
            background: #fff;
            border: 2px solid #2d2d2d;
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 0.9rem;
        }

        .topic-btn:hover {
            background: #f5f3f0;
            transform: translate(2px, 2px);
        }

        .topic-btn.active {
            background: #a8e6cf;
            border-color: #2d2d2d;
            box-shadow: 2px 2px 0px rgba(45, 45, 45, 0.2);
        }

        .topic-btn.completed {
            position: relative;
        }

        .topic-btn.completed::after {
            content: '✓';
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #2d2d2d;
            font-weight: bold;
        }

        .main-content {
            background: #fff;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 2rem;
            box-shadow: 4px 4px 0px rgba(45, 45, 45, 0.1);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #d4715f;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid #2d2d2d;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 2px solid #2d2d2d;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
            border-bottom: 2px solid #2d2d2d;
        }

        .tab-btn:hover {
            background: #f5f3f0;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe8d6 100%);
            border-bottom: 2px solid #d4715f;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .lesson-content {
            background: #fffbf7;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .lesson-text {
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .lesson-image {
            width: 100%;
            max-width: 500px;
            margin: 1.5rem 0;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            display: none;
        }

        .lesson-image.loaded {
            display: block;
        }

        .image-loading {
            background: #e8e8e8;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin: 1.5rem 0;
        }

        .listen-btn {
            background: linear-gradient(135deg, #a8e6cf 0%, #c9f0dd 100%);
            border: 2px solid #2d2d2d;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0.5rem 0.5rem 0;
            box-shadow: 2px 2px 0px rgba(45, 45, 45, 0.1);
        }

        .listen-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px rgba(45, 45, 45, 0);
        }

        .listen-btn:active {
            transform: translate(4px, 4px);
        }

        .listen-btn.speaking {
            background: linear-gradient(135deg, #ffd4a3 0%, #ffe8d6 100%);
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .vocab-card {
            background: linear-gradient(135deg, #ffd4a3 0%, #ffe8d6 100%);
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 3px 3px 0px rgba(45, 45, 45, 0.1);
            transition: all 0.2s ease;
        }

        .vocab-card:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(45, 45, 45, 0.1);
        }

        .vocab-term {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: #d4715f;
            margin-bottom: 0.5rem;
        }

        .vocab-definition {
            color: #2d2d2d;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .vocab-example {
            color: #666;
            font-size: 0.85rem;
            font-style: italic;
        }

        .experiment-card {
            background: linear-gradient(135deg, #c9f0dd 0%, #a8e6cf 100%);
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 3px 3px 0px rgba(45, 45, 45, 0.1);
        }

        .experiment-title {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: #d4715f;
            margin-bottom: 1rem;
        }

        .experiment-section {
            margin-bottom: 1rem;
        }

        .experiment-section strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #2d2d2d;
        }

        .experiment-section ul {
            margin-left: 1.5rem;
            line-height: 1.8;
        }

        .experiment-section li {
            margin-bottom: 0.5rem;
        }

        .quiz-container {
            display: none;
        }

        .quiz-container.active {
            display: block;
        }

        .quiz-question {
            background: #fffbf7;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 2px 2px 0px rgba(45, 45, 45, 0.05);
        }

        .quiz-question-text {
            font-weight: 700;
            margin-bottom: 1rem;
            color: #d4715f;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .quiz-option {
            background: #fff;
            border: 2px solid #2d2d2d;
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .quiz-option:hover {
            background: #f5f3f0;
            transform: translate(2px, 2px);
        }

        .quiz-option.selected {
            background: #a8e6cf;
        }

        .quiz-option.correct {
            background: linear-gradient(135deg, #a8e6cf 0%, #c9f0dd 100%);
            border-color: #2d2d2d;
        }

        .quiz-option.incorrect {
            background: linear-gradient(135deg, #ffd4a3 0%, #ffe8d6 100%);
            border-color: #2d2d2d;
        }

        .open-answer {
            width: 100%;
            padding: 1rem;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            font-family: 'Nunito', sans-serif;
            margin-top: 0.5rem;
            min-height: 100px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #d4715f 0%, #c9604f 100%);
            color: #fff;
            border: 2px solid #2d2d2d;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-top: 1rem;
            box-shadow: 3px 3px 0px rgba(45, 45, 45, 0.2);
        }

        .submit-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(45, 45, 45, 0.1);
        }

        .quiz-feedback {
            background: #fffbf7;
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
        }

        .quiz-feedback.show {
            display: block;
        }

        .quiz-feedback.correct {
            background: linear-gradient(135deg, #c9f0dd 0%, #a8e6cf 100%);
        }

        .quiz-feedback.incorrect {
            background: linear-gradient(135deg, #ffe8d6 0%, #ffd4a3 100%);
        }

        .fun-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .fun-fact-card {
            background: linear-gradient(135deg, #ffd4a3 0%, #ffe8d6 100%);
            border: 2px solid #2d2d2d;
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 3px 3px 0px rgba(45, 45, 45, 0.1);
        }

        .fun-fact-emoji {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .fun-fact-text {
            color: #2d2d2d;
            line-height: 1.6;
        }

        .badges-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .badge {
            background: #fff;
            border: 2px solid #2d2d2d;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 0px rgba(45, 45, 45, 0.1);
        }

        .badge.earned {
            opacity: 1;
            background: linear-gradient(135deg, #a8e6cf 0%, #c9f0dd 100%);
            transform: scale(1.05);
            box-shadow: 4px 4px 0px rgba(45, 45, 45, 0.2);
        }

        .badge-emoji {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .quiz-score {
            text-align: center;
            font-size: 1.5rem;
            color: #d4715f;
            margin: 1rem 0;
            font-weight: 700;
        }

        .reset-progress {
            background: linear-gradient(135deg, #ffd4a3 0%, #ffe8d6 100%);
            border: 2px solid #2d2d2d;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: none;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .header h1 {
                font-size: 1.8rem;
            }
        }

        .vocabulary-grid, .fun-facts {
            margin-top: 1.5rem;
        }

        .no-wrap {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 P4 Science Explorer</h1>
        <p>Discover the wonders of science through experiments and fun facts!</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>Topics</h3>
            <div class="topic-list" id="topicList"></div>
            <button class="reset-progress" onclick="resetProgress()">Reset Progress</button>
        </div>

        <div class="main-content">
            <div id="topicsContainer"></div>
        </div>
    </div>

    <script>
        const TOPICS = [
            {
                id: 'plants-parts',
                title: 'Plants and Their Parts',
                titleCh: '植物以及它们的组成部分',
                description: 'Learn about the different parts of plants and their functions.',
                vocabulary: [
                    { term: 'Root', definition: 'The part of the plant that grows underground and absorbs water and nutrients.' },
                    { term: 'Stem', definition: 'The main part of the plant that holds it upright and carries water.' },
                    { term: 'Leaf', definition: 'A flat, green part of the plant that makes food using sunlight.' },
                    { term: 'Flower', definition: 'The colorful part of the plant that helps make seeds.' },
                    { term: 'Seed', definition: 'A tiny structure that can grow into a new plant.' },
                    { term: 'Photosynthesis', definition: 'The process by which plants make food using sunlight, water, and air.' }
                ],
                experiment: {
                    title: 'Root Finding Activity',
                    materials: ['Jar', 'Blotting paper', 'Water', 'Beans'],
                    steps: [
                        'Fill the jar with damp blotting paper',
                        'Place a bean between the jar and the paper',
                        'Add water daily to keep the paper moist',
                        'Observe how roots grow downward in 3-5 days'
                    ]
                },
                funFacts: [
                    { emoji: '🌱', fact: 'Some plants have roots that are longer than their stems!' },
                    { emoji: '🍃', fact: 'Trees can live for hundreds of years!' },
                    { emoji: '🌻', fact: 'Sunflowers follow the sun during the day!' },
                    { emoji: '🥕', fact: 'Carrots are actually the roots of the carrot plant!' }
                ]
            },
            {
                id: 'plants-water',
                title: 'Plants and Water',
                titleCh: '植物和水',
                description: 'Understand how plants use water to survive.',
                vocabulary: [
                    { term: 'Absorption', definition: 'The process of water being taken in by plant roots.' },
                    { term: 'Transpiration', definition: 'The process by which water evaporates from plant leaves.' },
                    { term: 'Wilting', definition: 'When a plant droops because it does not have enough water.' },
                    { term: 'Nutrients', definition: 'Substances in soil that help plants grow strong and healthy.' },
                    { term: 'Soil', definition: 'The material on Earth\'s surface where plants grow.' }
                ],
                experiment: {
                    title: 'Plant Transpiration Observation',
                    materials: ['Plastic bag', 'Plant pot with plant', 'Tape', 'Water'],
                    steps: [
                        'Water your potted plant',
                        'Place a plastic bag around the entire plant',
                        'Seal the bag with tape',
                        'Leave in sunlight for a few hours',
                        'Observe water droplets inside the bag - this is transpiration!'
                    ]
                },
                funFacts: [
                    { emoji: '💧', fact: 'Plants need water to transport nutrients from roots to leaves!' },
                    { emoji: '🌳', fact: 'A large tree can release 1,000 liters of water per day through transpiration!' },
                    { emoji: '🏜️', fact: 'Desert plants have special adaptations to store water in their stems!' },
                    { emoji: '🌾', fact: 'Wilted plants can recover quickly once they get water!' }
                ]
            },
            {
                id: 'plants-light',
                title: 'Plants and Light',
                titleCh: '植物和光',
                description: 'Explore how plants use light to grow.',
                vocabulary: [
                    { term: 'Chlorophyll', definition: 'The green pigment that helps plants capture light energy.' },
                    { term: 'Phototropism', definition: 'The movement of plants towards light.' },
                    { term: 'Shade', definition: 'An area where sunlight is blocked by objects or trees.' },
                    { term: 'Intensity', definition: 'The brightness or strength of light.' },
                    { term: 'Spectrum', definition: 'The range of different colors in light.' }
                ],
                experiment: {
                    title: 'Plant Light Direction Experiment',
                    materials: ['Potted plant', 'Box', 'Scissors', 'Sunny location', 'Water'],
                    steps: [
                        'Cut a hole in one side of a cardboard box',
                        'Place the plant inside the box near the hole',
                        'Keep the plant in bright light from the window',
                        'Water regularly for 1-2 weeks',
                        'Observe how the plant bends toward the light!'
                    ]
                },
                funFacts: [
                    { emoji: '☀️', fact: 'Plants need sunlight to make their own food through photosynthesis!' },
                    { emoji: '🌿', fact: 'Plants can sense light direction and grow towards it!' },
                    { emoji: '🌙', fact: 'Some plants open their flowers during the day and close them at night!' },
                    { emoji: '💚', fact: 'Green leaves look green because they reflect green light!' }
                ]
            },
            {
                id: 'nutrition-plants',
                title: 'Nutrition in Plants',
                titleCh: '植物的营养',
                description: 'Learn what plants need to stay healthy.',
                vocabulary: [
                    { term: 'Nitrogen', definition: 'An element that helps plants grow leaves and stems.' },
                    { term: 'Phosphorus', definition: 'An element that helps plants develop roots and flowers.' },
                    { term: 'Potassium', definition: 'An element that helps plants grow fruit and seeds.' },
                    { term: 'Fertilizer', definition: 'A substance added to soil to provide nutrients to plants.' },
                    { term: 'NPK', definition: 'Abbreviation for Nitrogen, Phosphorus, and Potassium - the three main plant nutrients.' }
                ],
                experiment: {
                    title: 'Plant Nutrient Comparison',
                    materials: ['3 plant pots', 'Soil', 'Seeds/seedlings', 'Water', 'Fertilizer', 'Ruler'],
                    steps: [
                        'Plant identical seeds in 3 pots',
                        'Label: No fertilizer, Half-strength fertilizer, Full-strength fertilizer',
                        'Water equally and place in same light',
                        'Measure plant height weekly for 4-6 weeks',
                        'Compare growth and observe differences!'
                    ]
                },
                funFacts: [
                    { emoji: '🌾', fact: 'Plants absorb minerals through their roots like we absorb food through our stomachs!' },
                    { emoji: '🥬', fact: 'Nitrogen helps plants grow bigger and greener!' },
                    { emoji: '🌺', fact: 'Phosphorus helps plants make beautiful flowers!' },
                    { emoji: '🍎', fact: 'Potassium helps plants produce sweet fruits and seeds!' }
                ]
            },
            {
                id: 'food-tests',
                title: 'Food Tests',
                titleCh: '实物检测',
                description: 'Discover how to test for different types of food.',
                vocabulary: [
                    { term: 'Starch', definition: 'A carbohydrate found in foods like rice, bread, and potatoes.' },
                    { term: 'Protein', definition: 'A nutrient needed for building and repairing body tissues.' },
                    { term: 'Fat', definition: 'An energy-rich nutrient found in oils, nuts, and meat.' },
                    { term: 'Carbohydrate', definition: 'A nutrient that provides energy to our bodies.' },
                    { term: 'Iodine', definition: 'A chemical used to test for the presence of starch.' }
                ],
                experiment: {
                    title: 'Starch Test with Iodine',
                    materials: ['Various foods (bread, apple, rice, etc.)', 'Iodine solution', 'White plate', 'Dropper', 'Adult supervision'],
                    steps: [
                        'Place a small sample of food on a white plate',
                        'Ask an adult to carefully add one drop of iodine',
                        'Observe color change: blue-black means starch is present!',
                        'Test different foods and record results',
                        'Note: Iodine can stain, so be careful!'
                    ]
                },
                funFacts: [
                    { emoji: '🥔', fact: 'Potatoes are full of starch, which turns blue-black with iodine!' },
                    { emoji: '🍎', fact: 'Apples contain different nutrients than potatoes!' },
                    { emoji: '🍞', fact: 'Bread is high in starch to give us energy!' },
                    { emoji: '🧪', fact: 'Scientists use special tests to identify nutrients in food!' }
                ]
            },
            {
                id: 'water-cycle',
                title: 'The Water Cycle',
                titleCh: '水循环',
                description: 'Understand how water moves around our planet.',
                vocabulary: [
                    { term: 'Evaporation', definition: 'The process where water turns from liquid to gas due to heat.' },
                    { term: 'Condensation', definition: 'The process where water vapor cools and turns back into liquid.' },
                    { term: 'Precipitation', definition: 'Water falling from clouds as rain, snow, or sleet.' },
                    { term: 'Collection', definition: 'Water gathering in oceans, rivers, and lakes.' },
                    { term: 'Cycle', definition: 'A process that repeats over and over again.' }
                ],
                experiment: {
                    title: 'Water Cycle in a Bag',
                    materials: ['Clear plastic bag', 'Water', 'Marker', 'Tape', 'Sunny location'],
                    steps: [
                        'Fill a plastic bag halfway with water and seal it tightly',
                        'Mark the water level with a marker',
                        'Place in sunlight for several days',
                        'Observe water droplets forming inside (condensation)',
                        'See how the cycle repeats in miniature!'
                    ]
                },
                funFacts: [
                    { emoji: '☔', fact: 'The water you drink today may have been drunk by dinosaurs!' },
                    { emoji: '🌊', fact: 'The water cycle is powered by the Sun\'s heat!' },
                    { emoji: '☁️', fact: 'Clouds form when water vapor cools high in the atmosphere!' },
                    { emoji: '🌍', fact: 'About 97% of Earth\'s water is in the oceans!' }
                ]
            },
            {
                id: 'matter',
                title: 'Matter',
                titleCh: '物质',
                description: 'Learn about solids, liquids, and gases.',
                vocabulary: [
                    { term: 'Matter', definition: 'Anything that has mass and takes up space.' },
                    { term: 'Solid', definition: 'A state of matter with a fixed shape and volume.' },
                    { term: 'Liquid', definition: 'A state of matter that takes the shape of its container.' },
                    { term: 'Gas', definition: 'A state of matter with no fixed shape or volume.' },
                    { term: 'Properties', definition: 'Characteristics or qualities of matter.' }
                ],
                experiment: {
                    title: 'States of Water Observation',
                    materials: ['Ice', 'Water', 'Pot', 'Heat source', 'Thermometer'],
                    steps: [

            },
            {

                    { emoji: '🪞', fact: 'Mirrors reflect light to show you your reflection!' },

                ]
            },
            {
                id: 'heat',
                title: 'Heat',
                titleCh: '热',
                description: 'Learn about heat and temperature.',
                vocabulary: [

                    { term: 'Temperature', definition: 'A measure of how hot or cold something is.' },

            {
                id: 'sound',

                titleCh: '声音',
                description: 'Understand how sound is created and travels.',
                vocabulary: [
                    { term: 'Sound', definition: 'A form of energy that travels as waves through air, water, or solids.' },
                    { term: 'Vibration', definition: 'A rapid back-and-forth movement that creates sound.' },
                    { term: 'Pitch', definition: 'How high or low a sound is.' },
                    { term: 'Volume', definition: 'How loud or soft a sound is.' },

                ],
                experiment: {
                    title: 'Sound Vibration Detection',
                    materials: ['Balloon', 'Rice grains', 'Spoon', 'Pan', 'Tape'],
                    steps: [
                        'Stretch a balloon tightly over a pan',
                        'Tape it in place',

                        'Bang a spoon on the pan - watch rice jump from vibrations!'
                    ]
                },
                funFacts: [
                    { emoji: '🔊', fact: 'Sound travels in waves just like light!' },

            },
            {
                id: 'diversity',
                title: 'Diversity of Things',
                titleCh: '事物的多样性',
                description: 'Explore the amazing variety in nature.',
                vocabulary: [
                    { term: 'Diversity', definition: 'The variety of different things found in nature.' },
                    { term: 'Species', definition: 'A group of organisms that can reproduce together.' },

                ],
                experiment: {
                    title: 'Local Organism Hunt',
                    materials: ['Magnifying glass', 'Notebook', 'Camera (optional)', 'Outdoor space'],
                    steps: [
                        'Go to a park or garden',
                        'Look for different living things (insects, plants, birds)',
                        'Observe their features and behaviors',
                        'Draw or photograph them',
                        'Record where you found them and what they were doing'
                    ]
                },
                funFacts: [
                    { emoji: '🌍', fact: 'There are millions of different species on Earth!' },
                    { emoji: '🦁', fact: 'Each species has unique features that help it survive!' },

                    { emoji: '🐛', fact: 'Insects are the most diverse group of animals!' }
                ]
            }
        ];

        let currentTopic = null;
        let currentTab = null;
        let progress = {};
        let speaking = false;

        function initializeApp() {
            loadProgress();
            renderTopicList();
            renderTopicsContainer();
            selectTopic(TOPICS[0].id);
        }

        function renderTopicList() {
            const topicList = document.getElementById('topicList');
            topicList.innerHTML = TOPICS.map(topic => `
                <button class="topic-btn" onclick="selectTopic('${topic.id}')" id="topic-btn-${topic.id}">
                    ${topic.title}
                </button>
            `).join('');
        }

        function renderTopicsContainer() {
            const container = document.getElementById('topicsContainer');
            container.innerHTML = TOPICS.map(topic => `
                <div class="section" id="section-${topic.id}">
                    <h2 class="section-title">${topic.title}</h2>
                    <p style="margin-bottom: 1rem; color: #666;">${topic.description}</p>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('${topic.id}', 'lesson')">Lesson</button>
                        <button class="tab-btn" onclick="switchTab('${topic.id}', 'vocabulary')">Vocabulary</button>
                        <button class="tab-btn" onclick="switchTab('${topic.id}', 'experiment')">Experiment</button>
                        <button class="tab-btn" onclick="switchTab('${topic.id}', 'funfacts')">Fun Facts</button>
                        <button class="tab-btn" onclick="switchTab('${topic.id}', 'quiz')">Quiz</button>
                    </div>

                    <div class="tab-content active" id="tab-${topic.id}-lesson">
                        <div class="lesson-content">
                            <div class="lesson-text" id="lesson-text-${topic.id}">
                                Loading lesson content...
                            </div>
                            <div class="image-loading" id="img-loading-${topic.id}">Generating diagram...</div>
                            <img class="lesson-image" id="lesson-image-${topic.id}" alt="Lesson diagram">
                            <button class="listen-btn" onclick="speakLesson('${topic.id}')">
                                <span id="listen-icon-${topic.id}">🔊</span> Listen
                            </button>
                        </div>
                    </div>

                    <div class="tab-content" id="tab-${topic.id}-vocabulary">
                        <div class="vocabulary-grid" id="vocab-${topic.id}"></div>
                    </div>

                    <div class="tab-content" id="tab-${topic.id}-experiment">
                        <div class="experiment-card">
                            <div class="experiment-title">${topic.experiment.title}</div>
                            <div class="experiment-section">
                                <strong>Materials:</strong>
                                <ul>
                                    ${topic.experiment.materials.map(m => `<li>${m}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="experiment-section">
                                <strong>Steps:</strong>
                                <ol>
                                    ${topic.experiment.steps.map(s => `<li>${s}</li>`).join('')}
                                </ol>
                            </div>
                            <button class="listen-btn" onclick="speakExperiment('${topic.id}')">
                                <span id="exp-icon-${topic.id}">🔊</span> Listen to Steps
                            </button>
                        </div>
                    </div>

                    <div class="tab-content" id="tab-${topic.id}-funfacts">
                        <div class="fun-facts" id="facts-${topic.id}"></div>
                    </div>

                    <div class="tab-content" id="tab-${topic.id}-quiz">
                        <div class="quiz-container" id="quiz-${topic.id}"></div>
                    </div>
                </div>
            `).join('');

            // Populate content
            TOPICS.forEach(topic => {
                // Vocabulary
                const vocabContainer = document.getElementById(`vocab-${topic.id}`);
                vocabContainer.innerHTML = topic.vocabulary.map((v, idx) => `
                    <div class="vocab-card">
                        <div class="vocab-term">${v.term}</div>
                        <div class="vocab-definition">${v.definition}</div>
                        <button class="listen-btn" style="margin-top: 0.75rem; font-size: 0.9rem;" onclick="speakVocab('${topic.id}', ${idx})">
                            <span id="vocab-icon-${topic.id}-${idx}">🔊</span> Pronounce
                        </button>
                    </div>
                `).join('');

                // Fun Facts
                const factsContainer = document.getElementById(`facts-${topic.id}`);
                factsContainer.innerHTML = topic.funFacts.map(f => `
                    <div class="fun-fact-card">
                        <div class="fun-fact-emoji">${f.emoji}</div>
                        <div class="fun-fact-text">${f.fact}</div>
                    </div>
                `).join('');

                // Quiz
                generateQuiz(topic.id);
            });

            // Generate lesson images and text
            generateLessonContent();
        }

        function selectTopic(topicId) {
            currentTopic = topicId;

            // Update UI
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${topicId}`).classList.add('active');

            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`topic-btn-${topicId}`).classList.add('active');

            updateCompletionStatus();
            switchTab(topicId, 'lesson');
        }

        function switchTab(topicId, tabName) {
            const section = document.getElementById(`section-${topicId}`);
            section.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            section.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`tab-${topicId}-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        async function generateLessonContent() {
            const apiKey = process.env.HIGGSFIELD_API_KEY || 'demo-key-please-set-env-var';

            for (const topic of TOPICS) {
                const lessonElement = document.getElementById(`lesson-text-${topic.id}`);
                const imgElement = document.getElementById(`lesson-image-${topic.id}`);
                const loadingElement = document.getElementById(`img-loading-${topic.id}`);

                // Generate lesson text
                const lessonText = `
                    <strong>${topic.title}</strong>
                    <p style="margin-top: 0.5rem;">
                        ${topic.description}
                    </p>
                    <p style="margin-top: 0.5rem; color: #666;">
                        In this lesson, you'll learn about ${topic.title.toLowerCase()},
                        understand key concepts, and explore practical experiments you can do at home.
                        Use the other tabs to discover vocabulary, try experiments, learn fun facts, and test your knowledge!
                    </p>
                `;

                lessonElement.innerHTML = lessonText;

                // Try to generate image
                try {
                    const prompt = `Create a detailed, colorful science diagram for Singapore Primary 4 students about: ${topic.title}.
                    Show key concepts, labeled parts, and scientific accuracy. Use bright, educational colors.
                    Include labels and make it visually engaging for children.`;

                    // Check localStorage first
                    const cachedImage = localStorage.getItem(`lesson-image-${topic.id}`);
                    if (cachedImage) {
                        imgElement.src = cachedImage;
                        imgElement.classList.add('loaded');
                        loadingElement.style.display = 'none';
                    } else {
                        // Generate new image
                        const response = await fetch('https://api.higgsfield.io/anthropic/v1/images/generations', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'x-api-key': apiKey
                            },
                            body: JSON.stringify({
                                model: 'gpt-image-2',
                                prompt: prompt,
                                n: 1,
                                size: '1024x768'
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            const imageUrl = data.data[0].url;
                            localStorage.setItem(`lesson-image-${topic.id}`, imageUrl);
                            imgElement.src = imageUrl;
                            imgElement.classList.add('loaded');
                            loadingElement.style.display = 'none';
                        }
                    }
                } catch (error) {
                    loadingElement.innerHTML = 'Image generation requires API key. Set HIGGSFIELD_API_KEY environment variable.';
                }
            }
        }

        function generateQuiz(topicId) {
            const topic = TOPICS.find(t => t.id === topicId);
            const quizContainer = document.getElementById(`quiz-${topicId}`);

            const questions = [
                {
                    type: 'multiple',
                    text: `What is the main topic of this lesson?`,
                    options: [topic.title, 'Another topic', 'Different subject', 'Random question'],
                    correct: 0
                },
                {
                    type: 'multiple',
                    text: `What did you learn about ${topic.title.toLowerCase()}?`,
                    options: [
                        topic.description,
                        'Something different',
                        'Unrelated content',
                        'Random answer'
                    ],
                    correct: 0
                },
                {
                    type: 'open',
                    text: `Describe one key concept from ${topic.title} in your own words.`
                }
            ];

            quizContainer.innerHTML = questions.map((q, idx) => `
                <div class="quiz-question">
                    <div class="quiz-question-text">Question ${idx + 1}: ${q.text}</div>
                    ${q.type === 'multiple' ? `
                        <div class="quiz-options">
                            ${q.options.map((opt, optIdx) => `
                                <div class="quiz-option" onclick="selectAnswer('${topicId}', ${idx}, ${optIdx})">
                                    ${opt}
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <textarea class="open-answer" id="open-answer-${topicId}-${idx}" placeholder="Type your answer here..."></textarea>
                    `}
                    <div class="quiz-feedback" id="feedback-${topicId}-${idx}"></div>
                </div>
            `).join('');

            const submitBtn = document.createElement('button');
            submitBtn.className = 'submit-btn';
            submitBtn.textContent = 'Submit Quiz';
            submitBtn.onclick = () => submitQuiz(topicId);
            quizContainer.appendChild(submitBtn);
        }

        function selectAnswer(topicId, qIdx, optIdx) {
            const options = document.querySelectorAll(`#quiz-${topicId} .quiz-question`)[qIdx].querySelectorAll('.quiz-option');
            options.forEach(o => o.classList.remove('selected'));
            options[optIdx].classList.add('selected');
        }

        function submitQuiz(topicId) {
            let score = 0;
            const quizContainer = document.getElementById(`quiz-${topicId}`);
            const questions = quizContainer.querySelectorAll('.quiz-question');

            questions.forEach((q, idx) => {
                const feedback = document.getElementById(`feedback-${topicId}-${idx}`);
                const selected = q.querySelector('.quiz-option.selected');

                if (selected) {
                    const qIndex = TOPICS.find(t => t.id === topicId).id === topicId ? idx : -1;
                    const isCorrect = q.querySelectorAll('.quiz-option').indexOf(selected) === 0;

                    feedback.classList.add('show');
                    if (isCorrect) {
                        feedback.classList.add('correct');
                        feedback.textContent = '✓ Correct! Great job!';
                        score++;
                    } else {
                        feedback.classList.add('incorrect');
                        feedback.textContent = '✗ Not quite right. Try again!';
                    }
                }
            });

            // Mark topic as completed and add badge
            if (score >= questions.length - 1) {
                progress[topicId] = { completed: true, score: score, total: questions.length };
                saveProgress();
                document.getElementById(`topic-btn-${topicId}`).classList.add('completed');
                showBadge(topicId);
            }

            updateProgressBar();
            speakQuizFeedback(topicId, score, questions.length);
        }

        function speakLesson(topicId) {
            const topic = TOPICS.find(t => t.id === topicId);
            const text = `${topic.title}. ${topic.description}`;
            speak(text, topicId, 'lesson');
        }

        function speakVocab(topicId, vocabIdx) {
            const topic = TOPICS.find(t => t.id === topicId);
            const vocab = topic.vocabulary[vocabIdx];
            const text = `${vocab.term}. ${vocab.definition}`;
            speak(text, topicId, `vocab-${vocabIdx}`);
        }

        function speakExperiment(topicId) {
            const topic = TOPICS.find(t => t.id === topicId);
            const exp = topic.experiment;
            const text = `${exp.title}. Steps: ${exp.steps.join('. ')}`;
            speak(text, topicId, 'experiment');
        }

        function speakQuizFeedback(topicId, score, total) {
            const text = `Quiz complete! You scored ${score} out of ${total} points.`;
            speak(text, topicId, 'quiz');
        }

        function speak(text, sourceId, sourceType) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.2;

                // Visual feedback
                const icon = document.getElementById(`${sourceType === 'lesson' ? 'listen-icon' : sourceType === 'experiment' ? 'exp-icon' : sourceType === 'quiz' ? '' : `${sourceType.split('-')[0]}-icon`}-${sourceId}${sourceType.includes('-') && sourceType !== 'lesson' ? `-${sourceType.split('-')[1]}` : ''}`);
                if (icon) {
                    icon.textContent = '🔇';
                    utterance.onend = () => {
                        icon.textContent = '🔊';
                    };
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        function updateProgressBar() {
            const completed = Object.keys(progress).filter(key => progress[key]?.completed).length;
            const percentage = (completed / TOPICS.length) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function updateCompletionStatus() {
            TOPICS.forEach(topic => {
                const btn = document.getElementById(`topic-btn-${topic.id}`);
                if (progress[topic.id]?.completed) {
                    btn.classList.add('completed');
                }
            });
        }

        function showBadge(topicId) {
            // Could add badge display here
        }

        function saveProgress() {
            localStorage.setItem('p4science-progress', JSON.stringify(progress));
        }

        function loadProgress() {
            const saved = localStorage.getItem('p4science-progress');
            if (saved) {
                progress = JSON.parse(saved);
                updateProgressBar();
            }
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress?')) {
                progress = {};
                localStorage.removeItem('p4science-progress');
                document.querySelectorAll('.topic-btn.completed').forEach(b => b.classList.remove('completed'));
                document.getElementById('progressFill').style.width = '0%';
            }
        }

        // Initialize when page loads
        window.addEventListener('load', initializeApp);
    </script>
